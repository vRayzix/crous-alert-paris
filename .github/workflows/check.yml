name: Check CROUS Paris

on:
  schedule:
    # Relance TOUTES LES HEURES, pile. Chaque session dure ~55 min (voir
    # MAX_RUNTIME plus bas), calée sur cet intervalle : pas de trou de plusieurs
    # dizaines de minutes entre 2 sessions, juste le temps de démarrage de la
    # machine (quelques secondes).
    - cron: "0 * * * *"
  workflow_dispatch: {}   # permet aussi de lancer à la main depuis l'onglet Actions

# Nécessaire pour que le job puisse committer seen.json (l'état des logements vus)
permissions:
  contents: write

# Sécurité anti-chevauchement : si jamais une session dépasse son créneau (retard
# GitHub, etc.), on ne lance pas 2 exécutions en parallèle sur la même zone.
concurrency:
  group: crous-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 58   # marge de sécurité avant la prochaine heure
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Configurer git
        # Nécessaire AVANT de lancer le script : celui-ci committe/pousse
        # seen.json en cours de route (pas seulement à la fin), pour ne pas
        # perdre l'état si le job plante ou est tué en cours de route.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Lancer la surveillance (~55 min, calées sur l'heure)
        env:
          CROUS_SEARCH_URL: ${{ secrets.CROUS_SEARCH_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          POLL_INTERVAL: "30"      # vérifie toutes les 30 secondes
          MAX_RUNTIME: "3300"      # 55 min de vérifications non-stop
        run: python check_crous.py

      - name: Sauvegarder l'état final (filet de sécurité)
        # Au cas où le script se termine sans avoir eu de nouveau logement à
        # committer entre-temps (ex: rien n'a jamais bougé pendant les 55 min).
        run: |
          git add seen.json
          if git diff --staged --quiet; then
            echo "Pas de changement d'état."
          else
            git commit -m "update state [skip ci]"
            git push
          fi
